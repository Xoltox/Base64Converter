<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File to Base64 Converter</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            transition: border-color 0.2s;
            background: var(--bg);
        }

        .upload-area:hover, .upload-area:focus-within {
            border-color: var(--primary);
        }

        input[type="file"] {
            width: 100%;
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-light);
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--text-light);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .stats-bar {
            display: none;
            gap: 1.5rem;
            background: var(--bg);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.875rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-light);
            font-weight: 600;
        }

        .stat-value {
            color: var(--text);
            font-weight: 500;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875rem;
            resize: vertical;
            box-sizing: border-box;
            background-color: var(--bg);
            color: var(--text);
        }

        textarea:focus {
            outline: 2px solid var(--primary);
            outline-offset: -1px;
        }

        #fileInfo {
            font-size: 0.875rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
        }

        .footer a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--text);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>File to Base64 Converter</h1>
        
        <div class="upload-area">
            <input type="file" id="fileInput" aria-label="Upload file">
        </div>

        <div class="controls">
            <label class="checkbox-label">
                <input type="checkbox" id="includePrefix" checked>
                Include Data URI Prefix
            </label>
            <div id="fileInfo">No file selected</div>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <span class="stat-label">Original File Size</span>
                <span class="stat-value" id="statOrigSize">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Base64 Size</span>
                <span class="stat-value" id="statB64Size">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">String Length</span>
                <span class="stat-value" id="statLength">-</span>
            </div>
        </div>

        <textarea id="output" placeholder="Your Base64 string will appear here..." readonly></textarea>

        <div class="controls" style="justify-content: flex-end;">
            <button id="copyBtn" disabled>
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Copy to Clipboard
            </button>
        </div>
    </div>

    <div class="footer">
        <a href="https://github.com/Xoltox/Base64Converter" target="_blank" rel="noopener noreferrer">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path>
            </svg>
            View on GitHub
        </a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');
        const includePrefixToggle = document.getElementById('includePrefix');
        const fileInfo = document.getElementById('fileInfo');
        const statsBar = document.getElementById('statsBar');
        
        // Stat elements
        const statOrigSize = document.getElementById('statOrigSize');
        const statB64Size = document.getElementById('statB64Size');
        const statLength = document.getElementById('statLength');

        let fullDataUri = '';
        let originalFileBytes = 0;

        // Utility: Format bytes into readable string
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        // Handle file selection
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) {
                resetUI();
                return;
            }

            originalFileBytes = file.size;
            fileInfo.textContent = file.name;
            
            output.value = 'Converting...';
            statsBar.style.display = 'none';
            copyBtn.disabled = true;

            const reader = new FileReader();

            reader.onload = (e) => {
                fullDataUri = e.target.result;
                updateOutput();
                copyBtn.disabled = false;
            };

            reader.onerror = () => {
                output.value = 'Error reading file.';
                copyBtn.disabled = true;
            };

            reader.readAsDataURL(file);
        });

        // Handle prefix toggle
        includePrefixToggle.addEventListener('change', () => {
            if (fullDataUri) {
                updateOutput();
            }
        });

        // Update textarea and stats based on toggle state
        function updateOutput() {
            let currentString = '';
            
            if (includePrefixToggle.checked) {
                currentString = fullDataUri;
            } else {
                currentString = fullDataUri.split(',')[1] || '';
            }
            
            output.value = currentString;
            
            // Update Stats
            const stringLength = currentString.length;
            // A base64 string character is exactly 1 byte in memory/transfer size
            const base64Bytes = stringLength; 

            statOrigSize.textContent = formatBytes(originalFileBytes);
            statB64Size.textContent = formatBytes(base64Bytes);
            statLength.textContent = stringLength.toLocaleString() + ' chars';
            
            statsBar.style.display = 'flex';
        }

        // Handle copy button
        copyBtn.addEventListener('click', async () => {
            if (!output.value) return;
            
            try {
                await navigator.clipboard.writeText(output.value);
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '&#10003; Copied!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 2000);
            } catch (err) {
                alert('Failed to copy text. You can manually select and copy the text inside the box.');
            }
        });

        function resetUI() {
            fullDataUri = '';
            output.value = '';
            fileInfo.textContent = 'No file selected';
            statsBar.style.display = 'none';
            copyBtn.disabled = true;
        }
    </script>
</body>
</html>
